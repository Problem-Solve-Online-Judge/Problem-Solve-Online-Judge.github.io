<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Solve Online Judge</title>
    <link rel="icon" href="/logo.png" type="image/png">

    <!-- 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Monoton&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
</head>

<body>
    

    <div id="upbar">
        <img src="/sitebannerlogo.png" alt="">
        <div id="menu">
            <a href="#">문제(α)</a>
            <a href="#">대회(α)</a>
            <a href="#">순위(α)</a>     
            <a href="#">커뮤니티(α)</a>  
            <a href="#">소속(α)</a>     
            <a href="#">검색(α)</a>
        </div>
        <div id="logins">
            <a href="/SignUp" class="signup">회원 가입</a>
            <a href="/login" class="login">로그인</a>
        </div>
    </div>

    <div id="banner">
        <p style="color: white;">Solve your world.</p>
    </div>
</body>

<style>
    body{
        font-family: "Jua";
        margin: 0;
    }

    #logins{
        display: flex;
        justify-content: flex-end;
        gap: 20px;
        padding: 10px 20px;
    }

    .login,.signup{
        color: black;
        text-decoration: none;
    }

    .login:hover,.signup:hover{
        text-decoration: underline;
    }

    #upbar{
        border-radius: 10px;
        padding : 10px;
        /* x-오프셋 | y-오프셋 | 흐림 정도 | 그림자 크기 | 색상 */
        box-shadow: 10px 10px 20px rgba(197, 255, 158, 0.383);
      
        outline: 1px solid black;
        width: 80%;
        margin: 10px auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    #upbar img{
        width: 120px;
    }

    #menu{
        display: flex;
        gap: 30px;
    }

    #menu a{
        text-decoration: none;
        color: black;
        font-size: 1.2rem;
    }

    #menu a:hover{
        text-decoration: underline;
    }

    #banner{
        margin-top: 30px;
        background-size: cover;
        background-image: url(/banner.jpg);
        outline: 1px solid black;
        height: 60vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #banner p{
        font-family: "Monoton", cursive;
        font-size: 3rem;
    }
</style>
</html>
